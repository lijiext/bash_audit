name: Build Audited Bash

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      bash_version:
        description: 'Bash version to build (e.g., 4.2, 4.4, 5.0, 5.1, 5.2)'
        required: true
        default: '5.0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7]
        include:
          - arch: x86_64
            toolchain: ""
            host: ""
          - arch: aarch64
            toolchain: "gcc-aarch64-linux-gnu"
            host: "aarch64-linux-gnu"
          - arch: armv7
            toolchain: "gcc-arm-linux-gnueabihf"
            host: "arm-linux-gnueabihf"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bison wget build-essential ${{ matrix.toolchain }}

      - name: Download Bash Source
        run: |
          # 优先使用输入的版本，否则默认 5.0
          VERSION="${{ github.event.inputs.bash_version }}"
          if [ -z "$VERSION" ]; then VERSION="5.0"; fi
          echo "Building Bash version: $VERSION"
          wget "https://ftp.gnu.org/gnu/bash/bash-${VERSION}.tar.gz"
          tar -xzf "bash-${VERSION}.tar.gz"
          mv "bash-${VERSION}" bash-src

      - name: Apply Audit Patch
        run: |
          cd bash-src
          # 使用通用源码补丁
          patch -p0 < ../bash_audit.patch

      - name: Configure and Build
        run: |
          cd bash-src
          # 针对嵌入式环境推荐关闭 bash-malloc 以提高兼容性
          CONF_FLAGS="--without-bash-malloc"
          if [ -n "${{ matrix.host }}" ]; then
            CONF_FLAGS="$CONF_FLAGS --host=${{ matrix.host }}"
          fi
          ./configure $CONF_FLAGS
          make -j$(nproc)

      - name: Verify Binary
        run: |
          ls -l bash-src/bash
          file bash-src/bash

      - name: Upload Audited Bash Binary
        uses: actions/upload-artifact@v3
        with:
          name: bash-audited-${{ matrix.arch }}-v${{ github.event.inputs.bash_version || '5.0' }}
          path: bash-src/bash
